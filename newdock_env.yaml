name: newDock

channels:
  - pytorch
  - pyg
  - conda-forge

dependencies:
  - python=3.10
  - pip
  - numpy
  - scipy
  - pandas
  - scikit-learn
  - pyyaml
  - tqdm
  - requests
  - jinja2
  - setuptools
  - wheel
  - joblib
  - typing_extensions
  - biopython
  - MDAnalysis
  - _openmp_mutex
  
  - pip:
      - torch
      - torchvision
      - torchaudio
      - torch_geometric
